header:
  version: 14
  includes:
    - kas/include/kronus-common.yml
distro: kronus
machine: hifive-premier-p550
target: kronus-dev-image
repos:
  meta-sifive:
    url: https://github.com/sifive/meta-sifive.git
    commit: de6128f46295588244236a4ffef0afe647902644 # dev/meta-sifive/hifive-premier-p550

local_conf_header:
  hifive-premier-p550: |
    hostname:pn-base-files ?= "premier"
    IMAGE_FSTYPES:append = " wic.bmap"
    PACKAGECONFIG:append:pn-kmod = " zstd"
    PACKAGECONFIG:append:pn-kmod-native = " zstd"
    SRCREV_machine:hifive-premier-p550:pn-linux-sifive-hf-premier-p550 = "4cd2a50c950669acda257ed0eb9f68eb259a2daa"
    LINUX_VERSION:pn-linux-sifive-hf-premier-p550 = "6.6.59"